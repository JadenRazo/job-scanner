name: build-images

on:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - "worker/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Explicit image tag (defaults to git sha)"
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.image }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: api
            context: ./api
          - image: worker
            context: ./worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/job-scanner-${{ matrix.image }}
          # Tag every push with the short sha so we always have an immutable
          # reference, plus `latest` on main for humans + a `v1` alias so the
          # k3s manifest at raizhost-infra/base/apps/job-scanner/ can keep a
          # stable tag until argocd-image-updater or a release flow is wired.
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Job scanner ${{ matrix.image }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          platforms: linux/amd64
          provenance: false
